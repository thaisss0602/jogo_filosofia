<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Vídeo MP4</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .video-container {
            border: 4px solid #3f3f46;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }

        video {
            display: block; /* Remove margens inferiores bobas da tag */
            max-width: 100%;
            width: 640px;   /* Largura do player */
        }

        .controles-customizados {
            margin-top: 15px;
        }

        button {
            background-color: #e11d48;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #be123c;
        }
    </style>
</head>
<body>

    <h1>Meu Player de Vídeo</h1>

    <div class="video-container">
        <video id="meuVideo" controls>
            <source src="ninguem.mp4" type="video/mp4">
            Seu navegador não suporta a reprodução de vídeos HTML5.
        </video>
    </div>

    <div class="controles-customizados">
        <button id="btnPlayPause">Alternar Play/Pause via JS</button>
    </div>

    <script>
        // Pegando as referências dos elementos HTML
        const video = document.getElementById('meuVideo');
        const btnPlayPause = document.getElementById('btnPlayPause');

        // Adicionando um evento de clique no botão
        btnPlayPause.addEventListener('click', () => {
            if (video.paused) {
                video.play(); // Dá play se estiver pausado
            } else {
                video.pause(); // Pausa se estiver rodando
            }
        });
    </script>

</body>
</html>
